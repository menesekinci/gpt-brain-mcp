<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authorize Project Brain</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #111; color: #eee; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 32px; max-width: 420px; width: 90%; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    p { color: #aaa; font-size: 14px; line-height: 1.5; margin: 0 0 24px; }
    .scopes { background: #222; border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; }
    .scopes li { color: #ccc; font-size: 13px; margin: 6px 0; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #3b82f6; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #2563eb; }
    .muted { color: #666; font-size: 12px; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Authorize ChatGPT</h1>
    <p>ChatGPT is requesting access to <strong>Project Brain</strong> on your local machine.</p>
    <ul class="scopes">
      <li>Read allowed project files</li>
      <li>Create markdown plans under .chatgpt/</li>
    </ul>
    <form method="POST" action="{{ISSUER}}/oauth/approve">
      <input type="hidden" name="state" value="{{STATE}}">
      <input type="hidden" name="approve_token" value="{{APPROVE_TOKEN}}">
      <input type="hidden" name="redirect_uri" value="{{REDIRECT_URI}}">
      <input type="hidden" name="client_id" value="{{CLIENT_ID}}">
      <input type="hidden" name="code_challenge" value="{{CODE_CHALLENGE}}">
      <input type="hidden" name="code_method" value="{{CODE_METHOD}}">
      <button type="submit">Approve Access</button>
    </form>
    <p class="muted">Only click if you initiated this connection from ChatGPT.</p>
  </div>
</body>
</html>
