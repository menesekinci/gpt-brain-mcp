<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Project Brain MCP workflow</title>
  <desc id="desc">A planning assistant uses Project Brain MCP to inspect projects and create English plans for an implementation agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#102033"/>
      <stop offset="1" stop-color="#162b24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#66e3ff"/>
      <stop offset="1" stop-color="#86f7b3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="960" height="360" rx="28" fill="url(#bg)"/>
  <path d="M70 284 C190 214 262 284 376 222 S600 194 724 242 S850 252 906 194" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="18"/>
  <g filter="url(#shadow)">
    <rect x="64" y="86" width="214" height="146" rx="18" fill="#f8fbff"/>
    <rect x="373" y="74" width="214" height="170" rx="18" fill="#f8fbff"/>
    <rect x="682" y="86" width="214" height="146" rx="18" fill="#f8fbff"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#152235">
    <text x="171" y="132" text-anchor="middle" font-size="20" font-weight="700">Planning Assistant</text>
    <text x="171" y="164" text-anchor="middle" font-size="14">Reads, reasons, plans</text>
    <text x="171" y="188" text-anchor="middle" font-size="14">Writes English artifacts</text>
    <text x="480" y="120" text-anchor="middle" font-size="20" font-weight="700">Project Brain MCP</text>
    <text x="480" y="152" text-anchor="middle" font-size="14">Constrained file access</text>
    <text x="480" y="176" text-anchor="middle" font-size="14">Safe reads and markdown writes</text>
    <text x="480" y="204" text-anchor="middle" font-size="13" fill="#39546f">.chatgpt/  .ai/  AGENTS.md</text>
    <text x="789" y="132" text-anchor="middle" font-size="20" font-weight="700">Implementation Agent</text>
    <text x="789" y="164" text-anchor="middle" font-size="14">Follows prompt files</text>
    <text x="789" y="188" text-anchor="middle" font-size="14">Edits and validates code</text>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M292 158 H354"/>
    <path d="M342 146 L354 158 L342 170"/>
    <path d="M602 158 H664"/>
    <path d="M652 146 L664 158 L652 170"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#cde9f6">
    <text x="323" y="138" text-anchor="middle">MCP tools</text>
    <text x="633" y="138" text-anchor="middle">plans/prompts</text>
  </g>
  <text x="480" y="304" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Local projects stay local. Planning artifacts become the bridge.</text>
</svg>
